name: Moses Data Refresh
on:
  schedule:
    # Every 30 minutes during IST market hours (Mon-Fri, 9:00-15:30 IST)
    - cron: '*/30 3-10 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -r requirements.txt
      - name: Update
        run: python data_updater.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          git commit -m "🌲 Moses Data Sync [$(date -u +%Y-%m-%dT%H:%M:%SZ)]" || exit 0
          git pull --rebase --autostash origin main
          git push
